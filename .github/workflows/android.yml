name: Android CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.4
          cache-disabled: true

      - name: Build debug APK
        run: |
          set -o pipefail
          gradle assembleDebug --stacktrace --info 2>&1 | tee build.log

      - name: Extract error summary
        if: failure()
        run: |
          grep -E "^e:|^w:|FAILED|error:|Error:|FAILURE|Exception|> Task" build.log | tail -120 > error_summary.txt || true
          echo "" >> error_summary.txt
          echo "=== Last 80 lines of build.log ===" >> error_summary.txt
          tail -80 build.log >> error_summary.txt

      - name: Upload build log and error summary on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build.log
            error_summary.txt
          if-no-files-found: ignore

      - name: List all outputs
        run: |
          {
            echo "=== APK files ==="
            find app/build/outputs -type f -name "*.apk" -print || true
            echo "=== All outputs ==="
            find app/build/outputs -type f -print || true
          } > outputs.txt
          cat outputs.txt

      - name: Upload outputs list
        uses: actions/upload-artifact@v4
        with:
          name: outputs-list
          path: outputs.txt

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: remote-manager-debug-apk
          path: |
            app/build/outputs/apk/**/*.apk
            app/build/outputs/**/*.apk
          if-no-files-found: warn
